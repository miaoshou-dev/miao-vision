charts:
  - id: kpi_total_sales
    type: bigvalue
    title: Total sales
    data:
      transform:
        - type: aggregate
          measures:
            - field: sales
              op: sum
              as: total_sales
    encoding:
      value:
        field: total_sales
        type: quantitative
  - id: ranking_by_region
    type: bar
    title: sales by region
    data:
      transform:
        - type: aggregate
          groupBy:
            - region
          measures:
            - field: sales
              op: sum
              as: total_sales
        - type: sort
          field: total_sales
          order: desc
        - type: limit
          value: 10
    encoding:
      x:
        field: region
        type: nominal
      y:
        field: total_sales
        type: quantitative
insights: []

